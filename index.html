<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NettoTrack</title>

  <!-- Core -->
  <link rel="stylesheet" href="ui.css" />
  <link rel="stylesheet" href="ui-layout.css" />
  <link rel="stylesheet" href="ui-components.css" />
  <link rel="stylesheet" href="ui-forms.css" />
  <link rel="stylesheet" href="ui-feedback.css" />
  <link rel="stylesheet" href="ui-feedback-animations.css" />
  <link rel="stylesheet" href="ui-animations.css" />

  <!-- Calendar modules -->
  <link rel="stylesheet" href="calendar-day.css" />
  <link rel="stylesheet" href="calendar-day-animations.css" />
  <link rel="stylesheet" href="calendar-days-strip.css" />
  <link rel="stylesheet" href="calendar-days-strip-animations.css" />

  <style>
    html, body {
      min-height: 100%;
    }

    body {
      background:
        radial-gradient(circle at 20% 10%, rgba(81,140,255,.20), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(255,92,204,.14), transparent 26%),
        radial-gradient(circle at 55% 80%, rgba(98,209,255,.10), transparent 24%),
        linear-gradient(180deg, #091120 0%, #0c1326 42%, #0a0f1f 100%);
      overflow: hidden;
    }

    .ntApp {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding:
        calc(env(safe-area-inset-top) + 12px)
        16px
        calc(env(safe-area-inset-bottom) + 12px);
      gap: 14px;
    }

    .ntTopBar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      min-height: 54px;
    }

    .ntTopBarTitle {
      font-size: 20px;
      font-weight: 1000;
      line-height: 1.1;
      color: var(--nt-text);
      letter-spacing: .2px;
    }

    .ntTopBarSub {
      margin-top: 4px;
      font-size: 13px;
      line-height: 1.35;
      color: var(--nt-text-muted);
      font-weight: 700;
    }

    .ntMain {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ntCardStage {
      flex: 1 1 auto;
      min-height: 0;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(120% 180% at 0% 0%, rgba(255,255,255,.08), transparent 42%),
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.04));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 20px 40px rgba(0,0,0,.22);
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 14px;
    }

    .ntBottomBar {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .ntBottomBtn {
      min-height: 58px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 20px;
      background:
        radial-gradient(140% 220% at 25% 0%, rgba(255,255,255,.08), transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.04));
      color: var(--nt-text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-family: var(--nt-font-family);
      padding: 8px 6px;
    }

    .ntBottomBtn:active {
      background: var(--nt-pressed-fill);
    }

    .ntBottomIcon {
      font-size: 18px;
      line-height: 1;
      font-weight: 900;
    }

    .ntBottomLabel {
      font-size: 12px;
      line-height: 1.1;
      font-weight: 800;
      color: var(--nt-text-muted);
    }

    .ntDotsRail {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      min-height: 18px;
    }

    .ntDotsRail .ntDotNav {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,.22);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
    }

    .ntDotsRail .ntDotNav.isActive {
      width: 18px;
      background: linear-gradient(90deg,#32c5ff 0%, #756bff 45%, #ff4fd8 100%);
    }

    @media (min-width: 600px) {
      .ntApp {
        padding-left: 20px;
        padding-right: 20px;
      }

      .ntTopBarTitle {
        font-size: 22px;
      }

      .ntBottomBtn {
        min-height: 62px;
      }
    }
  </style>
</head>

<body>
  <div class="ntApp">
    <header class="ntTopBar">
      <div>
        <div class="ntTopBarTitle">NettoTrack</div>
        <div class="ntTopBarSub">Il tuo stipendio, nel tempo.</div>
      </div>
    </header>

    <main class="ntMain">
      <section class="ntCardStage">
        <div class="ntCardsViewport" id="ntCardsViewport">
          <div class="ntCardsTrack" id="ntCardsTrack"></div>
        </div>
      </section>

      <div class="ntDotsRail hidden" id="ntCardDotsMount"></div>
    </main>

    <footer class="ntBottomBar">
      <button class="ntBottomBtn ntPress" type="button" id="btnInsert">
        <div class="ntBottomIcon">＋</div>
        <div class="ntBottomLabel">Inserisci</div>
      </button>

      <button class="ntBottomBtn ntPress" type="button" id="btnCalendar">
        <div class="ntBottomIcon">📅</div>
        <div class="ntBottomLabel">Calendario</div>
      </button>

      <button class="ntBottomBtn ntPress" type="button" id="btnProfile">
        <div class="ntBottomIcon">👤</div>
        <div class="ntBottomLabel">Profilo</div>
      </button>

      <button class="ntBottomBtn ntPress" type="button" id="btnMenu">
        <div class="ntBottomIcon">☰</div>
        <div class="ntBottomLabel">Menu</div>
      </button>
    </footer>
  </div>

  <!-- Core cards -->
  <script src="ui-cards.js"></script>
  <script src="ui-card-manager.js"></script>
  <script src="ui-card-actions.js"></script>
  <script src="ui-card-wizard.js"></script>
  <script src="ui-card-dots.js"></script>
  <script src="ui-card-gestures.js"></script>

  <!-- Feedback -->
  <script src="ui-select.js"></script>
  <script src="ui-tooltip.js"></script>
  <script src="ui-modal.js"></script>
  <script src="ui-toast.js"></script>
  <script src="ui-empty-state.js"></script>

  <!-- Calendar -->
  <script src="calendar-day.js"></script>
  <script src="calendar-days-strip.js"></script>

  <!-- Builders -->
  <script src="card-template.js"></script>
  <script src="component-registry.js"></script>

  <script>
    const viewportEl = document.getElementById("ntCardsViewport");
    const trackEl = document.getElementById("ntCardsTrack");
    const dotsMount = document.getElementById("ntCardDotsMount");

    if (window.NTCardDots) {
      NTCardDots.setMount(dotsMount);
    }

    if (window.NTCards) {
      NTCards.setElements({
        viewportEl,
        trackEl,
        dotsHook: (data) => {
          if (window.NTCardDots) NTCardDots.render(data);
        }
      });
    }

    if (window.NTCardGestures) {
      NTCardGestures.setViewport(viewportEl);
    }

    function registerDemoCards() {
      if (!window.NTCards || !window.NTCardTemplate || !window.NTComponents) return;

      NTCards.registerCard({
        id: "calendarView",
        render() {
          const stripMount = `<div class="ntCardSubHeaderContent" id="calendarStripMount"></div>`;

          const body = `
            ${NTComponents.section({
              title: "Calendario",
              body: `
                ${NTComponents.emptyState({
                  icon: "○",
                  title: "Calendar View",
                  text: "Qui collegheremo la vista calendario completa."
                })}
              `
            })}
          `;

          return NTCardTemplate.createCard({
            id: "calendarView",
            title: "Calendario",
            body,
            subHeader: stripMount,
            footer: false,
            showBack: true,
            showNext: true
          });
        },
        onOpen() {
          const mount = document.getElementById("calendarStripMount");
          if (!mount || !window.NTCalendarDaysStrip) return;

          const today = NTCalendarDaysStrip.formatDateISO(new Date());
          const days = NTCalendarDaysStrip.build7DaysFromDate(new Date(), {
            selectedDate: today,
            hasDataMap: {
              [today]: true
            }
          });

          NTCalendarDaysStrip.createStore({
            mount,
            days,
            selectedDate: today
          });
        }
      });

      NTCards.registerCard({
        id: "calendarInsert",
        render() {
          const body = `
            ${NTComponents.section({
              title: "Nuovo inserimento",
              body: `
                ${NTComponents.grid2({
                  left: NTComponents.input({ placeholder: "Nome" }),
                  right: NTComponents.input({ placeholder: "Cognome" })
                })}

                ${NTComponents.fieldAction({
                  label: "Data di nascita"
                })}

                ${NTComponents.button({
                  label: "Uomo",
                  kind: "toggle",
                  pressed: false
                })}

                ${NTComponents.checkbox({
                  title: "Accetto i termini",
                  desc: "Ho letto e accetto le condizioni"
                })}
              `
            })}
          `;

          return NTCardTemplate.createCard({
            id: "calendarInsert",
            title: "Inserisci dati",
            body,
            footer: true,
            showBack: true,
            showNext: true
          });
        },
        onSave() {
          if (window.NTToast) {
            NTToast.show({
              title: "Dati salvati",
              text: "Le modifiche della card sono state registrate."
            });
          }
        }
      });

      NTCards.registerCard({
        id: "profile",
        render() {
          const body = `
            ${NTComponents.avatar({
              variant: "nothing",
              title: "Profilo utente",
              hint: "Configura il tuo profilo personale e lavorativo."
            })}

            ${NTComponents.divider()}

            ${NTComponents.section({
              title: "Informazioni",
              body: `
                ${NTComponents.input({ placeholder: "Paese" })}
                ${NTComponents.input({ placeholder: "Occupazione" })}
                ${NTComponents.textarea({ placeholder: "Note profilo" })}
              `
            })}
          `;

          return NTCardTemplate.createCard({
            id: "profile",
            title: "Profilo utente",
            body,
            footer: true,
            showBack: true,
            showNext: true
          });
        },
        onSave() {
          if (window.NTToast) {
            NTToast.show({
              title: "Profilo salvato",
              text: "Le informazioni del profilo sono state aggiornate."
            });
          }
        }
      });

      NTCards.registerCard({
        id: "menu",
        render() {
          const body = `
            ${NTComponents.section({
              title: "Menu rapido",
              body: `
                ${NTComponents.button({ label: "FAQ", kind: "secondary" })}
                ${NTComponents.button({ label: "Disclaimer", kind: "secondary" })}
                ${NTComponents.button({ label: "Termini", kind: "secondary" })}
              `
            })}
          `;

          return NTCardTemplate.createCard({
            id: "menu",
            title: "Menu",
            body,
            footer: false,
            showBack: true,
            showNext: true
          });
        }
      });
    }

    registerDemoCards();

    document.getElementById("btnInsert")?.addEventListener("click", () => {
      window.NTCardManager?.open("calendarInsert");
    });

    document.getElementById("btnCalendar")?.addEventListener("click", () => {
      window.NTCardManager?.open("calendarView");
    });

    document.getElementById("btnProfile")?.addEventListener("click", () => {
      window.NTCardManager?.open("profile");
    });

    document.getElementById("btnMenu")?.addEventListener("click", () => {
      window.NTCardManager?.open("menu");
    });

    window.NTCardManager?.open("calendarView");
  </script>
</body>
</html>
