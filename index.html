<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#3b2b6a" />

  <title>NettoTrack</title>

  <!-- CSS (cache-bust) -->
  <link rel="stylesheet" href="./ui.css?v=20260223-1" />
  <link rel="stylesheet" href="./calendar-insert.css?v=20260223-1" />
  <link rel="stylesheet" href="./calendar-view.css?v=20260223-1" />
  <link rel="stylesheet" href="./day-editor.css?v=20260223-1" />
</head>

<body>
  <div class="bgFX" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="grain"></div>
  </div>

  <div class="appRoot" id="appRoot">
    <header class="topBar" id="topBar">
      <button class="menuBtn" id="menuBtn" aria-label="Apri menu" type="button">≡</button>

      <div class="brand" id="brand">
        <div class="brandName">NettoTrack</div>
        <div class="brandSub">Il tuo stipendio, nel tempo.</div>
      </div>

      <div class="topRightSpacer"></div>
    </header>

    <main class="stage" id="stage">
      <section class="cardsViewport" id="cardsViewport" aria-label="Cards">
        <div class="cardsTrack" id="cardsTrack">
          <article class="card slide isActive" data-slide-id="home" data-title="Home" aria-label="Home">
            <div class="cardInner" id="homeMount"></div>
          </article>
        </div>
      </section>

      <div class="dotsWrap" id="dotsWrap" aria-label="Navigazione cards">
        <div class="dotsPill" id="dotsPill"></div>
      </div>
    </main>

    <footer class="bottomBar" id="bottomBar" aria-label="Barra inferiore">
      <div class="bottomBarGlass"></div>
    </footer>
  </div>

  <div class="menuOverlay" id="menuOverlay" aria-hidden="true"></div>
  <aside class="menuDrawer" id="menuDrawer" aria-hidden="true"></aside>
  <button class="menuCloseBtn" id="menuCloseBtn" aria-label="Chiudi menu" type="button">×</button>

  <!-- JS (cache-bust) -->
  <script src="./ui.js?v=20260223-1"></script>
  <script src="./menu.js?v=20260223-1"></script>
  <script src="./calendar-core.js?v=20260223-1"></script>
  <script src="./calendar-insert.js?v=20260223-1"></script>
  <script src="./day-editor.js?v=20260223-1"></script>
  <script src="./calendar-view.js?v=20260223-1"></script>
</body>
</html>
