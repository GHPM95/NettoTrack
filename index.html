<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#3b2b6a" />

  <title>NettoTrack</title>

  <link rel="stylesheet" href="ui.css" />
  <link rel="stylesheet" href="calendar-insert.css" />
  <link rel="stylesheet" href="calendar-view.css" />
  <link rel="stylesheet" href="day-editor.css" />
</head>

<body>
  <!-- SFONDO (blob / aurora) -->
  <div class="bgFX" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="grain"></div>
  </div>

  <div class="appRoot" id="appRoot">
    <!-- TOP BAR -->
    <header class="topBar" id="topBar">
      <button class="menuBtn" id="menuBtn" aria-label="Apri menu" type="button">≡</button>

      <div class="brand" id="brand">
        <div class="brandName">NettoTrack</div>
        <div class="brandSub">Il tuo stipendio, nel tempo.</div>
      </div>

      <div class="topRightSpacer"></div>
    </header>

    <!-- AREA CENTRALE: CARD + DOTS -->
    <main class="stage" id="stage">
      <section class="cardsViewport" id="cardsViewport" aria-label="Cards">
        <div class="cardsTrack" id="cardsTrack">
          <!-- HOME (sempre esiste) -->
          <article class="card slide isActive" data-slide-id="home" data-title="Home" aria-label="Home">
            <div class="cardInner" id="homeMount">
              <!-- volutamente vuoto -->
            </div>
          </article>
        </div>
      </section>

      <!-- DOTS (sempre fuori dalla card, centrati sotto) -->
      <div class="dotsWrap" id="dotsWrap" aria-label="Navigazione cards">
        <div class="dotsPill" id="dotsPill"></div>
      </div>
    </main>

    <!-- TASK BAR INFERIORE (placeholder) -->
    <footer class="bottomBar" id="bottomBar" aria-label="Barra inferiore">
      <div class="bottomBarGlass"></div>
    </footer>
  </div>

  <!-- MENU DRAWER -->
  <div class="menuOverlay" id="menuOverlay" aria-hidden="true"></div>
  <aside class="menuDrawer" id="menuDrawer" aria-hidden="true"></aside>

  <!-- X (chiude menu) -->
  <button class="menuCloseBtn" id="menuCloseBtn" aria-label="Chiudi menu" type="button">×</button>

  <!-- JS: UNA SOLA VOLTA, ordine pulito -->
  <script src="ui.js"></script>
  <script src="menu.js"></script>

  <!-- Core condiviso PRIMA dei moduli -->
  <script src="calendar-core.js"></script>

  <!-- Moduli -->
  <script src="calendar-insert.js"></script>
  <script src="day-editor.js"></script>
  <script src="calendar-view.js"></script>
</body>
</html>
