<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NettoTrack</title>

  <link rel="stylesheet" href="ui.css" />
  <link rel="stylesheet" href="ui-layout.css" />
  <link rel="stylesheet" href="ui-components.css" />
  <link rel="stylesheet" href="ui-forms.css" />
  <link rel="stylesheet" href="ui-feedback.css" />
  <link rel="stylesheet" href="ui-feedback-animations.css" />
  <link rel="stylesheet" href="ui-animations.css" />
  <link rel="stylesheet" href="ui-menu-layout.css" />
  <link rel="stylesheet" href="ui-theme-settings.css" />

  <link rel="stylesheet" href="calendar-day.css" />
  <link rel="stylesheet" href="calendar-day-animations.css" />
  <link rel="stylesheet" href="calendar-days-strip.css" />
  <link rel="stylesheet" href="calendar-days-strip-animations.css" />
</head>

<body class="theme-light">
  <div class="ntAppShell">
    <div class="ntAppBg" aria-hidden="true">
      <div class="ntBlob ntBlob1"></div>
      <div class="ntBlob ntBlob2"></div>
      <div class="ntBlob ntBlob3"></div>
    </div>

    <div class="ntApp">
      <header class="ntTopBar">
        <button
          type="button"
          class="ntIconBtn ntPress ntTopAction"
          data-nt-open-menu
          aria-label="Apri menu"
        >☰</button>

        <div>
          <div class="ntTopBarTitle">NettoTrack</div>
          <div class="ntTopBarSub">Il tuo stipendio, nel tempo.</div>
        </div>
      </header>

      <main class="ntMain">
        <section class="ntCardStage">
          <div class="ntCardsViewport" id="ntCardsViewport">
            <div class="ntCardsTrack" id="ntCardsTrack"></div>
          </div>
        </section>

        <div class="ntDotsRail hidden" id="ntCardDotsMount"></div>
      </main>

      <footer class="ntBottomBar">
        <div class="ntBottomSmartCard" id="ntBottomSmartCard"></div>
      </footer>
    </div>
  </div>

  <div class="ntMenuOverlay" id="ntMenuOverlay" aria-hidden="true">
    <div class="ntMenuBackdrop"></div>

    <div class="ntMenuShell">
      <div class="ntMenuPanelWrap">
        <aside class="ntMenuPanel"></aside>
      </div>

      <div class="ntMenuCloseZone">
        <div class="ntMenuCloseBtnWrap">
          <button
            type="button"
            class="ntIconBtn ntPress"
            data-nt-close-menu
            aria-label="Chiudi menu"
          >×</button>
        </div>
      </div>
    </div>
  </div>

  <script src="ui-cards.js"></script>
  <script src="ui-card-manager.js"></script>
  <script src="ui-card-actions.js"></script>
  <script src="ui-card-wizard.js"></script>
  <script src="ui-card-dots.js"></script>
  <script src="ui-card-gestures.js"></script>

  <script src="ui-select.js"></script>
  <script src="ui-tooltip.js"></script>
  <script src="ui-modal.js"></script>
  <script src="ui-toast.js"></script>
  <script src="ui-empty-state.js"></script>

  <script src="calendar-day.js"></script>
  <script src="calendar-days-strip.js"></script>

  <script src="card-template.js"></script>
  <script src="component-registry.js"></script>

  <script src="ui-menu-content.js"></script>
  <script src="ui-menu.js"></script>

  <script>
    const viewportEl = document.getElementById("ntCardsViewport");
    const trackEl = document.getElementById("ntCardsTrack");
    const dotsMount = document.getElementById("ntCardDotsMount");

    if (window.NTCardDots) {
      NTCardDots.setMount(dotsMount);
    }

    if (window.NTCards) {
      NTCards.setElements({
        viewportEl,
        trackEl,
        dotsHook: (data) => {
          if (window.NTCardDots) {
            NTCardDots.render(data);
          }
        }
      });
    }

    if (window.NTCardGestures) {
      NTCardGestures.setViewport(viewportEl);
    }

    function applyTheme(mode) {
      const nextMode = mode === "dark" ? "theme-dark" : "theme-light";
      document.body.classList.remove("theme-light", "theme-dark");
      document.body.classList.add(nextMode);
      localStorage.setItem("ntThemeMode", nextMode);
    }

    function getCurrentTheme() {
      const saved = localStorage.getItem("ntThemeMode");
      if (saved === "theme-dark" || saved === "theme-light") return saved;
      return document.body.classList.contains("theme-dark") ? "theme-dark" : "theme-light";
    }

    function updateThemeSelectionUI(currentThemeClass) {
      const root = document.getElementById("ntThemeModes");
      if (!root) return;

      root.querySelectorAll("[data-nt-theme]").forEach((btn) => {
        const isDark = btn.dataset.ntTheme === "dark";
        const shouldBeActive =
          (isDark && currentThemeClass === "theme-dark") ||
          (!isDark && currentThemeClass === "theme-light");

        btn.classList.toggle("isSelected", shouldBeActive);

        const stateEl = btn.querySelector(".ntThemeModeState");
        if (stateEl) {
          stateEl.textContent = shouldBeActive ? "In uso" : "Tocca per attivare";
        }
      });
    }

    function bindThemeCard() {
      const root = document.getElementById("ntThemeModes");
      if (!root) return;

      const current = getCurrentTheme();
      updateThemeSelectionUI(current);

      root.querySelectorAll("[data-nt-theme]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const selected = btn.dataset.ntTheme === "dark" ? "theme-dark" : "theme-light";
          applyTheme(selected === "theme-dark" ? "dark" : "light");
          updateThemeSelectionUI(selected);
        });
      });

      /* qui va agganciato il tuo on/off universale già esistente */
      const autoMount = document.getElementById("ntThemeAutoMount");
      if (autoMount) {
        autoMount.innerHTML = "";
      }
    }

    function registerDemoCards() {
      if (!window.NTCards || !window.NTCardTemplate || !window.NTComponents) return;

      NTCards.registerCard({
        id: "calendarView",
        render() {
          const subHeader = `<div class="ntCardSubHeaderContent" id="calendarStripMount"></div>`;

          const body = `
            ${NTComponents.section({
              title: "Calendario",
              body: `
                ${NTComponents.emptyState({
                  icon: "○",
                  title: "Calendar View",
                  text: "Qui collegheremo la vista calendario completa."
                })}
              `
            })}
          `;

          return NTCardTemplate.createCard({
            id: "calendarView",
            title: "Calendario",
            body,
            subHeader,
            footer: true,
            showBack: true,
            showNext: true
          });
        },
        onOpen() {
          const mount = document.getElementById("calendarStripMount");
          if (!mount || !window.NTCalendarDaysStrip) return;

          const today = NTCalendarDaysStrip.formatDateISO(new Date());
          const days = NTCalendarDaysStrip.build7DaysFromDate(new Date(), {
            selectedDate: today,
            hasDataMap: { [today]: true }
          });

          NTCalendarDaysStrip.createStore({
            mount,
            days,
            selectedDate: today
          });
        }
      });

      NTCards.registerCard({
        id: "calendarInsert",
        render() {
          const body = `
            ${NTComponents.section({
              title: "Nuovo inserimento",
              body: `
                ${NTComponents.grid2({
                  left: NTComponents.input({ placeholder: "Nome" }),
                  right: NTComponents.input({ placeholder: "Cognome" })
                })}

                ${NTComponents.fieldAction({
                  label: "Data di nascita"
                })}

                ${NTComponents.button({
                  label: "Uomo",
                  kind: "toggle",
                  pressed: false
                })}

                ${NTComponents.checkbox({
                  title: "Accetto i termini",
                  desc: "Ho letto e accetto le condizioni"
                })}
              `
            })}
          `;

          return NTCardTemplate.createCard({
            id: "calendarInsert",
            title: "Inserisci dati",
            body,
            footer: true,
            showBack: true,
            showNext: true
          });
        }
      });

      NTCards.registerCard({
        id: "profile",
        render() {
          const body = `
            ${NTComponents.avatar({
              variant: "nothing",
              title: "Profilo utente",
              hint: "Configura il tuo profilo personale e lavorativo."
            })}

            ${NTComponents.divider()}

            ${NTComponents.section({
              title: "Informazioni",
              body: `
                ${NTComponents.input({ placeholder: "Paese" })}
                ${NTComponents.input({ placeholder: "Occupazione" })}
                ${NTComponents.textarea({ placeholder: "Note profilo" })}
              `
            })}
          `;

          return NTCardTemplate.createCard({
            id: "profile",
            title: "Profilo utente",
            body,
            footer: true,
            showBack: true,
            showNext: true
          });
        }
      });

      NTCards.registerCard({
        id: "themeSettings",
        render() {
          const body = `
            <div class="ntThemeModes" id="ntThemeModes">
              <button type="button" class="ntThemeMode ntPress" data-nt-theme="light">
                <div class="ntThemeModePreview ntThemeModePreview--light"></div>
                <div class="ntThemeModeText">
                  <div class="ntThemeModeLabel">Modalità chiara</div>
                  <div class="ntThemeModeState">Tocca per attivare</div>
                </div>
              </button>

              <button type="button" class="ntThemeMode ntPress" data-nt-theme="dark">
                <div class="ntThemeModePreview ntThemeModePreview--dark"></div>
                <div class="ntThemeModeText">
                  <div class="ntThemeModeLabel">Modalità scura</div>
                  <div class="ntThemeModeState">Tocca per attivare</div>
                </div>
              </button>
            </div>

            <div class="ntThemeAutoMount" id="ntThemeAutoMount"></div>
          `;

          return NTCardTemplate.createCard({
            id: "themeSettings",
            title: "Aspetto e tema",
            body,
            footer: false,
            showBack: true,
            showNext: false
          });
        },
        onOpen() {
          bindThemeCard();
        }
      });
    }

    registerDemoCards();

    window.NTMenu?.init({
      overlaySelector: "#ntMenuOverlay",
      openBtnSelector: "[data-nt-open-menu]"
    });

    const savedTheme = localStorage.getItem("ntThemeMode");
    if (savedTheme === "theme-dark" || savedTheme === "theme-light") {
      document.body.classList.remove("theme-light", "theme-dark");
      document.body.classList.add(savedTheme);
    }

    window.NTCardManager?.open("calendarView");
  </script>
</body>
</html>
